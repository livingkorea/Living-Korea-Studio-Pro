name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore LivingKoreaStudio/LivingKoreaStudio.csproj

      - name: Publish Windows EXE
        run: dotnet publish LivingKoreaStudio/LivingKoreaStudio.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:EnableCompressionInSingleFile=true

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LivingKoreaStudio-Windows-EXE
          path: LivingKoreaStudio/bin/Release/net8.0-windows/win-x64/publish/

name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore LivingKoreaStudio/LivingKoreaStudio.csproj

     - name: Publish
       run: dotnet publish LivingKoreaStudio/LivingKoreaStudio.csproj -c Release -r win-x64 --self-contained true -o publish /p:PublishSingleFile=false /p:PublishTrimmed=false

- name: Upload artifact
  uses: actions/upload-artifact@v4
  with:
    name: LivingKoreaStudio-win-x64
    path: publish/
